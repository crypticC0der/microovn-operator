name: Pull Request

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '12 6 * * 1'
  workflow_dispatch:

jobs:
  inclusive-naming:
    name: Inclusive naming
    uses: canonical/Inclusive-naming/.github/workflows/woke.yaml@main
    with:
      fail-on-error: "false"

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y tox
      - name: Check Code
        run: make check-code

  alert-test:
    name: Test Prometheus Alert Rules
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install prometheus snap
        run: sudo snap install prometheus
      - name: Check validity of prometheus alert rules
        run: promtool check rules src/prometheus_alert_rules/*
      - name: Run unit tests for prometheus alert rules
        run: promtool test rules tests/alerts/*.yaml

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y tox
      - name: Run Unit Tests
        run: make check-unit

  pack-microovn:
    name: Pack MicroOVN charm
    uses: ./.github/workflows/_build_charm.yaml
    with:
      path-to-charm-directory: .

  pack-interface-consumer:
    name: Pack interface consumer charm
    uses: ./.github/workflows/_build_charm.yaml
    with:
      path-to-charm-directory: tests/interface-consumer
      pre-pack-hook: make charm-libs

  setup:
    name: Setup tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y tox jq
      - name: Discover individual tests
        id: discover
        run: |
          # The tox environment configuration installs dependencies with poetry
          # in commands_pre.
          #
          # Consequently we cannot simply use the `--notest` argument to get
          # the virtual environment populated with dependencies.
          #
          # The integration environment conveniently passes arguments to
          # pytest, and we can use its `--version` argument as a noop which
          # achieves the same thing.
          tox -e integration -- --version
          tests=$(.tox/integration/bin/pytest -q --collect-only tests/integration/ | grep ::test_ | jq -R -s -c 'split("\n")[:-1]')
          echo $tests
          echo "matrix={\"test\":$tests}" >> $GITHUB_OUTPUT

  test:
    name: Run integration tests
    runs-on: ubuntu-latest
    needs:
      - pack-microovn
      - pack-interface-consumer
      - setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: ./charms

      - name: Set charm paths
        run: |
          # Find each charm file by its expected prefix
          MICROOVN_CHARM_PATH=$(find ./charms -type f -name 'microovn_*.charm' -print -quit)
          INTERFACE_CONSUMER_CHARM_PATH=$(find ./charms -type f -name 'interface-consumer_*.charm' -print -quit)

          echo "MICROOVN_CHARM_PATH=$MICROOVN_CHARM_PATH" >> $GITHUB_ENV
          echo "INTERFACE_CONSUMER_CHARM_PATH=$INTERFACE_CONSUMER_CHARM_PATH" >> $GITHUB_ENV

          echo "MicroOVN charm: $MICROOVN_CHARM_PATH"
          echo "Interface consumer charm: $INTERFACE_CONSUMER_CHARM_PATH"
          echo "LXD_CONTROLLER=github-lxd" >> $GITHUB_ENV
          echo "K8S_CONTROLLER=github-k8s" >> $GITHUB_ENV
      - name: Install Snaps (Juju, K8s, LXD)
        run: |
          sudo snap install juju --channel=3.6/stable
          sudo snap install k8s --channel=latest/stable --classic
          # LXD is usually pre-installed on Ubuntu runners, but we ensure it's ready
          sudo lxd init --auto
          sudo usermod -a -G lxd $USER

      - name: Initialize Kubernetes
        run: |
          # Bootstrap the single-node k8s cluster
          sudo k8s status --wait-ready

          # Create .kube directory and export the config for Juju/Kubectl
          mkdir -p $HOME/.kube
          sudo k8s kubectl config view --raw | tee $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Bootstrap Juju
        run: |
          # Add the k8s cluster as a Juju cloud
          # We use the 'k8s' snap's config we just exported
          juju add-k8s k8s-cloud --kubeconfig=$HOME/.kube/config

          juju bootstrap k8s-cloud ${{ env.K8S_CONTROLLER }}
          juju bootstrap localhost ${{ env.LXD_CONTROLLER }}

          # Default to the K8s controller for the tests
          juju switch ${{ env.LXD_CONTROLLER }}

      - name: Run tests
        run: make check-integration TESTSUITEFLAGS="${{ matrix.test }}"
