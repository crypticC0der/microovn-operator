type: charm

title: MicroOVN Charm

name: microovn
summary: A thin layer around MicroOVN, to allow it to be used as a charm
description: |
  A thin layer over the software defined networking project MicroOVN.
  This is a machine charm that primarily allows MicroOVN to be used easily within
  Juju, enabling its many ease-of-use features to integrate with the charm ecosystem.

links:
  contact: OVN Engineering <ubuntu-ovn-eng@lists.launchpad.net>
  source: https://github.com/canonical/microovn-operator
  issues: https://github.com/canonical/microovn-operator/issues
  website: https://charmhub.io/microovn

platforms:
  ubuntu@26.04:amd64:
  ubuntu@26.04:arm64:
  ubuntu@26.04:ppc64el:
  ubuntu@26.04:riscv64:
  ubuntu@26.04:s390x:

parts:
  rust-deps:
    plugin: nil
    build-packages:
      - cargo-1.91
      - rustc-1.91
    override-build: |
      ln -s /usr/bin/rustc-1.91 /usr/bin/rustc
      ln -s /usr/bin/cargo-1.91 /usr/bin/cargo
      craftctl default
      cargo --version
  poetry-deps:
    plugin: nil
    after: [rust-deps]
    build-packages:
      - curl
    override-build: |
      PIP_BREAK_SYSTEM_PACKAGES=true python3 -m pip install --user poetry==2.2.1 poetry-plugin-export==1.9.0
      ln -sf "$HOME/.local/bin/poetry" /usr/local/bin/poetry
      poetry config --local installer.no-binary :all:
    build-environment:
      - POETRY_VERSION: "2.2.1"
      - MATURIN_NO_INSTALL_RUST: "1"
  charm:
    source: .
    plugin: poetry
    after: [poetry-deps]
    override-build: |
      echo "setuptools-scm<10.0.0" > constraints.txt
      craftctl default
    build-packages:
      - git
      - python3-dev
      - libffi-dev
      - libssl-dev
      - pkg-config
    build-environment:
      - PIP_CONSTRAINT: constraints.txt
      - MATURIN_NO_INSTALL_RUST: "1"

config:
  options:
    microovn_risk:
      default: edge
      description: the risk we use for installing the microovn snap alongside a static track
      type: string
    ovn_exporter_risk:
      default: edge
      description: the risk we use for installing the ovn-exporter snap alongside a static track
      type: string

charm-libs:
  - lib: tls_certificates_interface.tls_certificates
    version: "4"
  - lib: microcluster_token_distributor.token_distributor
    version: "0.1"
  - lib: operator-libs-linux.snap
    version: "2"
  - lib: grafana_agent.cos_agent
    version: "0"
  - lib: role_distributor.role_assignment
    version: "0"

requires:
  cluster:
    interface: worker-cluster
    limit: 1
  certificates:
    interface: tls-certificates
  ovsdb-external:
    interface: ovsdb-cms
  role-assignment:
    interface: role-assignment
    limit: 1
    optional: true

provides:
  ovsdb:
    interface: ovsdb
  cos-agent:
    interface: cos_agent
    optional: true
